<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Portal Admin - UKM HIQMA</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hiqma-navy': '#0F2D59',
            'hiqma-gold': '#D4AF37',
            'hiqma-cream': '#F9F8F6',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-islamic-dark min-h-screen flex items-center justify-center p-4 font-['Plus_Jakarta_Sans']">

  <!-- Glow Effect Backgrounds -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-hiqma-navy/30 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-hiqma-gold/10 rounded-full blur-3xl pointer-events-none"></div>

  <!-- Login Card Container -->
  <div class="w-full max-w-md bg-hiqma-navy/80 backdrop-blur-md border border-white/10 p-8 rounded-3xl shadow-2xl relative z-10 space-y-6">
    
    <!-- Logo & Title -->
    <div class="text-center space-y-2">
      <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-white/5 border border-hiqma-gold/30 p-2 shadow-inner">
        <img src="/Images/Logo-Hiqma-uinjkt.png" alt="Logo HIQMA" class="max-h-full max-w-full object-contain">
      </div>
      <h1 class="text-2xl font-extrabold text-white">Portal Admin</h1>
      <p class="text-xs text-white/60">Kabinet Ashfiya 2026 - UKM HIQMA UIN Jakarta</p>
    </div>

    <!-- Error Alert Banner -->
    <div id="error-banner" class="hidden p-3.5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-200 text-xs flex items-start gap-2.5">
      <svg class="h-4 w-4 text-red-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <span id="error-message">Email atau password salah!</span>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-4">
      
      <!-- Email Field -->
      <div class="space-y-1">
        <label for="email" class="text-xs font-bold text-hiqma-gold uppercase tracking-wider block">Email Admin</label>
        <div class="relative">
          <input type="email" id="email" required placeholder="admin@hiqma.org"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-hiqma-gold transition-colors pl-10">
          <svg class="h-4 w-4 text-white/40 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
          </svg>
        </div>
      </div>

      <!-- Password Field -->
      <div class="space-y-1">
        <label for="password" class="text-xs font-bold text-hiqma-gold uppercase tracking-wider block">Kata Sandi</label>
        <div class="relative">
          <input type="password" id="password" required placeholder="••••••••"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-hiqma-gold transition-colors pl-10">
          <svg class="h-4 w-4 text-white/40 absolute left-3 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submit-btn"
        class="w-full bg-gradient-to-r from-hiqma-gold to-yellow-500 hover:from-yellow-500 hover:to-hiqma-gold text-hiqma-navy font-bold py-3 rounded-xl text-sm transition-all shadow-lg hover:shadow-hiqma-gold/20 flex items-center justify-center gap-2">
        <span>Masuk Portal</span>
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
      </button>

    </form>

  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin/dashboard';
    }

    const form = document.getElementById('login-form');
    const banner = document.getElementById('error-banner');
    const errorMsg = document.getElementById('error-message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset UI state
      banner.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Memproses...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.status === 'success') {
          // Store token and user data
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.admin));
          
          // Redirect to dashboard
          window.location.href = '/admin/dashboard';
        } else {
          showError(data.message || 'Login gagal, periksa email dan password Anda.');
        }
      } catch (err) {
        showError('Gagal terhubung ke server. Silakan coba beberapa saat lagi.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Masuk Portal</span>';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      banner.classList.remove('hidden');
    }
  </script>
</body>
</html>
